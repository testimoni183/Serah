<script id="jsbin-javascript">
// Nama perintah: tampilPesan
// 'teksYangDibawa' itu kotak sementara buat nampung tulisan dari HTML tadi
function tampilPesan(teksYangDibawa) {
  
  // 1. Cari alamat tulisan di layar
  let layar = document.getElementById('kotakPesan');
  
  // 2. Ganti isinya sesuai gambar yang diklik
  layar.innerHTML = 'Kamu Memilih: ' + teksYangDibawa;
  
  // 3. Tambahan: Kasih suara pop-up (opsional)
  alert('Pesanan Masuk: ' + teksYangDibawa);
}
function tampilPesan(pesanan) {
  // 1. Masukin nomor WA kamu di sini (Pake kode negara 62, jangan 0)
  let nomorWA = '6283142509109'; // Ganti pake nomor kamu ya!

  // 2. Bikin kalimat pesannya biar rapi
  let kalimat = 'Halo, saya mau pesan: ' + pesanan;

  // 3. Gabungin jadi Link WA (encodeURIComponent biar spasi jadi kode aman)
  let linkWA = 'https://wa.me/' + nomorWA + '?text=' + encodeURIComponent(kalimat);

  // 4. Perintah buat buka Tab Baru ke WA
  window.open(linkWA, '_blank');
  
  // 5. Tetep update tulisan di layar web kamu (biar keren)
  document.getElementById('kotakPesan').innerHTML = 'Membuka WhatsApp untuk: ' + pesanan;
}
</script>
