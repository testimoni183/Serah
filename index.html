<!DOCTYPE html>
<html>
<head>
    <title>Menu Saya</title>
</head>
<body>

    <h1 id="tampilanMenu">Menu Hari Ini: Kosong</h1>
    <button onclick="pilihMenu()">Ganti Menu!</button>

    <script>
        // --- BAGIAN JAWA SRIP (OTAKNYA) ---
        let nomor = 0;

        function pilihMenu() {
            nomor = nomor + 1;
            let layar = document.getElementById('tampilanMenu');

            if (nomor == 1) {
                layar.innerHTML = 'Menu: Nasi Goreng 🍳';
                kirimWA('Nasi Goreng');
            } 
            else if (nomor == 2) {
                layar.innerHTML = 'Menu: Mie Ayam 🍜';
                kirimWA('Mie Ayam');
            } 
            else if (nomor == 3) {
                layar.innerHTML = 'Menu: Es Teh 🍹';
                kirimWA('Es Teh');
                nomor = 0; // Balik ke awal
            }
        }

        function kirimWA(pesanan) {
            let nomorWA = '6283142509109'; // <--- GANTI PAKE NOMOR KAMU!
            let link = 'https://wa.me/' + nomorWA + '?text=' + encodeURIComponent('Halo, pesan: ' + pesanan);
            
            // Kasih delay 1 detik biar orang sempet liat tulisannya ganti dulu
            setTimeout(function() {
                window.open(link, '_blank');
            }, 1000);
        }
    </script>

</body>
</html>
